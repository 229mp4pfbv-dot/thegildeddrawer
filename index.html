<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body {
    margin: 0;
    padding: 0;
    background: #ffffff;
    text-align: center;
    color: #222;
}

.logo {
    width: 420px;
    max-width: 75%;
    display: block;
    margin: 20px auto 0 auto;
}

.hero {
    width: 100%;
    max-width: 1100px;
    display: block;
    margin: 0 auto;
}

.content {
    padding: 40px 20px 80px;
    font-family: "Cormorant Garamond", Georgia, serif;
}

.tagline {
    font-size: 52px;
    font-weight: 500;
    color: #b8953f;
    margin-bottom: 20px;
    letter-spacing: 1px;
}

.location {
    font-size: 34px;
    margin-bottom: 12px;
}

.launching {
    font-size: 32px;
    color: #b8953f;
    text-transform: uppercase;
    letter-spacing: 4px;
    margin-bottom: 20px;
}

.email {
    font-size: 26px;
}

@media (max-width: 768px) {

    .logo {
        width: 220px;
        margin-top: 10px;
    }

    .tagline {
        font-size: 34px;
    }

    .location {
        font-size: 24px;
    }

    .launching {
        font-size: 22px;
    }

    .email {
        font-size: 18px;
    }

    .content {
        padding-top: 25px;
    }
}

</style>

</head>

<body>

<img src="gilded_drawer_logo_transparent.png" class="logo">

<img src="FrontPageBH.PNG" class="hero">

<div class="content">

    <div class="tagline">
        An Intimate World of Luxury.
    </div>

    <div class="location">
        Los Angeles, California
    </div>

    <div class="launching">
        Launching Soon
    </div>

    <div class="email">
        info@thegildeddrawer.com
    </div>

</div>

</body>

</html>
