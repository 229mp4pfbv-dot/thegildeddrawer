<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>The Gilded Drawer</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    padding: 0;
    background-color: #ffffff;
    text-align: center;
    color: #2d2d2d;
}

.logo {
    width: 500px;
    max-width: 80%;
    margin-top: 50px;
    margin-bottom: 40px;
}

.hero {
    width: 100%;
    max-width: 1000px;
    height: auto;
}

.content {
    margin-top: 60px;
    margin-bottom: 80px;
    font-family: "Cormorant Garamond", serif;
}

.tagline {
    font-size: 2.2rem;
    font-weight: 400;
    margin-bottom: 20px;
}

.location {
    font-size: 1.8rem;
    margin-bottom: 20px;
}

.launching {
    font-size: 1.8rem;
    margin-bottom: 20px;
}

.email {
    font-size: 1.6rem;
    margin-top: 30px;
}

@media (max-width: 768px) {

    .logo {
        width: 280px;
        margin-top: 30px;
        margin-bottom: 25px;
    }

    .tagline {
        font-size: 1.5rem;
    }

    .location,
    .launching {
        font-size: 1.3rem;
    }

    .email {
        font-size: 1.1rem;
    }
}
</style>

</head>

<body>

<img src="gilded_drawer_logo_transparent.png"
     alt="The Gilded Drawer"
     class="logo">

<img src="FrontPageBH.PNG"
     alt="The Gilded Drawer Beverly Hills"
     class="hero">

<div class="content">

    <div class="tagline">
        Where Luxury is Baseline.
    </div>

    <div class="location">
        Los Angeles, California
    </div>

    <div class="launching">
        Launching Soon
    </div>

    <div class="email">
        info@thegildeddrawer.com
    </div>

</div>

</body>
</html>
