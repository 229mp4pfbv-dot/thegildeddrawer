<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>The Gilded Drawer</title>

<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:wght@400;500;600&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    padding: 0;
    text-align: center;
    color: #111;
    font-family: "Bodoni Moda", serif;

    background:
        linear-gradient(
            rgba(255,255,255,.96),
            rgba(255,255,255,.96)
        ),
        url("Inside store.jpg");

    background-size: cover;
    background-position: center;
    background-attachment: fixed;
}

.container {
    max-width: 1400px;
    margin: auto;
    padding: 20px;
}

.logo {
    width: 360px;
    max-width: 80%;
    display: block;
    margin: 10px auto 0 auto;
}

nav {
    display: flex;
    justify-content: center;
    gap: 14px;
    flex-wrap: wrap;
    margin: 8px 0 18px 0;
}

nav a {
    text-decoration: none;
    color: #111;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
}

nav a:hover {
    opacity: .7;
}

.hero {
    width: 100%;
    max-width: 1100px;
    display: block;
    margin: 0 auto;
}

.tagline {
    margin-top: 35px;
    font-size: 42px;
    line-height: 1.25;
}

.location {
    margin-top: 10px;
    font-size: 24px;
}

.comingsoon {
    margin-top: 10px;
    font-size: 18px;
    letter-spacing: 3px;
    text-transform: uppercase;
}

.email {
    margin-top: 18px;
    font-size: 18px;
}

.bottom-nav {
    margin-top: 35px;
    margin-bottom: 60px;
}

.bottom-nav a {
    text-decoration: none;
    color: #111;
    font-size: 13px;
    letter-spacing: 1px;
}

.bottom-nav span {
    margin: 0 8px;
}

@media (max-width: 768px) {

    .logo {
        width: 240px;
    }

    nav {
        gap: 10px;
    }

    nav a {
        font-size: 11px;
    }

    .tagline {
        font-size: 30px;
    }

    .location {
        font-size: 18px;
    }

    .comingsoon {
        font-size: 15px;
    }

    .email {
        font-size: 15px;
    }

}

</style>

</head>

<body>

<div class="container">

<img src="gilded_drawer_logo_transparent.png"
     alt="The Gilded Drawer"
     class="logo">

<nav>
    <a href="maison.html">Maison</a>
    <a href="collections.html">Collections</a>
    <a href="investors.html">Investors</a>
    <a href="careers.html">Careers</a>
    <a href="contact.html">Contact</a>
</nav>

<img src="FrontPageBH.PNG"
     alt="The Gilded Drawer Beverly Hills"
     class="hero">

<div class="tagline">
    Where Luxury is Baseline.
</div>

<div class="location">
    Los Angeles, California
</div>

<div class="comingsoon">
    Coming Soon
</div>

<div class="email">
    info@thegildeddrawer.com
</div>

<div class="bottom-nav">

    <a href="investors.html">Investor Relations</a>

    <span>|</span>

    <a href="careers.html">Careers</a>

    <span>|</span>

    <a href="contact.html">Contact</a>

</div>

</div>

</body>

</html>
