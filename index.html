<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>The Gilded Drawer</title>

<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:wght@400;500;600&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    text-align: center;
    color: #111;

    background:
        linear-gradient(
            rgba(255,255,255,.96),
            rgba(255,255,255,.96)
        ),
        url("InsideStore.jpg");

    background-size: cover;
    background-position: center;
    background-attachment: fixed;

    font-family: "Bodoni Moda", serif;
}

.container {
    max-width: 1400px;
    margin: auto;
    padding: 20px 20px 80px;
}

.logo {
    width: 340px;
    max-width: 75%;
    display: block;
    margin: 10px auto 5px;
}

nav {
    display: flex;
    justify-content: center;
    gap: 14px;
    flex-wrap: wrap;
    margin-bottom: 18px;
}

nav a {
    text-decoration: none;
    color: #111;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    font-size: 12px;
}

nav a:hover {
    opacity: .7;
}

.hero {
    width: 100%;
    max-width: 1100px;
    display: block;
    margin: 0 auto;
}

.tagline {
    margin-top: 35px;
    font-size: 40px;
    line-height: 1.3;
}

.location {
    margin-top: 12px;
    font-size: 24px;
}

.comingsoon {
    margin-top: 12px;
    font-size: 20px;
    letter-spacing: 2px;
}

.email {
    margin-top: 20px;
    font-size: 18px;
}

@media (max-width: 768px) {

    .logo {
        width: 220px;
    }

    nav {
        gap: 10px;
    }

    nav a {
        font-size: 11px;
    }

    .tagline {
        font-size: 28px;
    }

    .location {
        font-size: 18px;
    }

    .comingsoon {
        font-size: 16px;
    }

    .email {
        font-size: 15px;
    }
}

</style>
</head>

<body>

<div class="container">

<img src="gilded_drawer_logo_transparent.png" class="logo" alt="The Gilded Drawer">

<nav>
    <a href="maison.html">Maison</a>
    <a href="collections.html">Collections</a>
    <a href="investors.html">Investors</a>
    <a href="careers.html">Careers</a>
    <a href="contact.html">Contact</a>
</nav>

<img src="FrontPageBH.PNG" class="hero" alt="The Gilded Drawer">

<div class="tagline">
    Where Luxury is Baseline.
</div>

<div class="location">
    Los Angeles, California
</div>

<div class="comingsoon">
    Coming Soon
</div>

<div class="email">
    info@thegildeddrawer.com
</div>

</div>

</body>
</html>
